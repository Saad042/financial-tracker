{% if messages %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-4">
    {% for message in messages %}
    <div class="rounded-lg px-4 py-3 mb-2 text-sm {% if message.tags == 'success' %}bg-green-100 dark:bg-green-900/40 text-green-800 dark:text-green-300{% elif message.tags == 'error' %}bg-red-100 dark:bg-red-900/40 text-red-800 dark:text-red-300{% elif message.tags == 'warning' %}bg-yellow-100 dark:bg-yellow-900/40 text-yellow-800 dark:text-yellow-300{% else %}bg-blue-100 dark:bg-blue-900/40 text-blue-800 dark:text-blue-300{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
