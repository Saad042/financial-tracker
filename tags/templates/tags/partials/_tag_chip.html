<span class="inline-flex items-center gap-1 px-2 py-1 rounded-full text-xs font-medium text-white mr-1 mb-1" style="background-color: {{ tag.display_color }}" data-tag-id="{{ tag.pk }}">
    {{ tag.name }}
    <input type="hidden" name="tags" value="{{ tag.pk }}">
    <button type="button" onclick="removeTag(this)" class="ml-0.5 hover:text-gray-200">&times;</button>
</span>
