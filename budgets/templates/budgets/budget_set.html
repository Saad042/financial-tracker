{% extends "base.html" %}
{% load currency %}

{% block title %}Set Budgets - {{ month|date:"F Y" }} - Expense Tracker{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-6">Set Budgets &mdash; {{ month|date:"F Y" }}</h1>

    <form method="post" class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 space-y-4">
        {% csrf_token %}

        {% for item in categories %}
        <div>
            <label for="amount_{{ item.category.id }}" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">{{ item.category.name }}</label>
            <input
                type="number"
                name="amount_{{ item.category.id }}"
                id="amount_{{ item.category.id }}"
                value="{{ item.amount }}"
                step="0.01"
                min="0"
                placeholder="0.00"
                class="w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 shadow-sm focus:border-emerald-500 focus:ring-emerald-500"
            >
        </div>
        {% endfor %}

        <div class="flex items-center space-x-3 pt-2">
            <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg text-sm font-medium transition-colors">Save Budgets</button>
            <a href="{% url 'budgets:overview' %}?month={{ month|date:'Y-m' }}" class="text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200 text-sm">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
